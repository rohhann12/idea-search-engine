version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: TRUE
      PERSIST_DIRECTORY: /chroma/chroma
    networks:
      - app-network

  embedding-service:
    build: ./embedding-service
    container_name: embedding-service
    ports:
      - "8001:8001"
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3004:3004"
    depends_on:
      - embedding-service
      - chromadb
    networks:
      - app-network

  ui:
    build: ./ui
    container_name: ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3004
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:

volumes:
  chroma_data:
